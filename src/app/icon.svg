<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="wolfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e7490;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="#090909" rx="12"/>

  <!-- Left ear outer -->
  <polygon points="22,6 34,32 14,30" fill="url(#wolfGrad)"/>
  <!-- Left ear inner -->
  <polygon points="24,12 33,29 18,28" fill="#0c4a6e"/>

  <!-- Right ear outer -->
  <polygon points="78,6 66,32 86,30" fill="url(#wolfGrad)"/>
  <!-- Right ear inner -->
  <polygon points="76,12 67,29 82,28" fill="#0c4a6e"/>

  <!-- Main head shape - geometric polygon -->
  <polygon points="50,14 68,22 82,40 78,62 64,78 50,84 36,78 22,62 18,40 32,22" fill="url(#faceGrad)"/>

  <!-- Top forehead highlight -->
  <polygon points="50,14 58,24 50,30 42,24" fill="#22d3ee" opacity="0.5"/>

  <!-- Left cheek facet -->
  <polygon points="22,42 34,38 30,58 18,58" fill="#0e7490"/>
  <!-- Right cheek facet -->
  <polygon points="78,42 66,38 70,58 82,58" fill="#0e7490"/>

  <!-- Nose bridge center stripe -->
  <polygon points="50,28 46,46 50,50 54,46" fill="#0c4a6e"/>

  <!-- Muzzle area -->
  <polygon points="36,58 50,52 64,58 60,72 50,76 40,72" fill="#0891b2"/>

  <!-- Left brow ridge -->
  <polygon points="28,38 40,34 36,42 26,44" fill="#0c4a6e"/>
  <!-- Right brow ridge -->
  <polygon points="72,38 60,34 64,42 74,44" fill="#0c4a6e"/>

  <!-- Left eye socket -->
  <polygon points="30,44 38,40 44,46 40,54 32,54" fill="#090909"/>
  <!-- Left eye glow -->
  <circle cx="37" cy="47" r="3.5" fill="#67e8f9" opacity="0.95"/>
  <circle cx="38" cy="46" r="1.5" fill="white"/>

  <!-- Right eye socket -->
  <polygon points="70,44 62,40 56,46 60,54 68,54" fill="#090909"/>
  <!-- Right eye glow -->
  <circle cx="63" cy="47" r="3.5" fill="#67e8f9" opacity="0.95"/>
  <circle cx="64" cy="46" r="1.5" fill="white"/>

  <!-- Nose -->
  <polygon points="46,64 50,60 54,64 50,68" fill="#083344"/>

  <!-- Chin point -->
  <polygon points="40,72 50,76 60,72 50,82" fill="#0e7490"/>
</svg>
